<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>NEOTERIC ROOTS — 360°</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#f4eee9; --dim:rgba(244,238,233,.55); --line:rgba(244,238,233,.22);
    --accent:#ff1f8f; --glass:rgba(10,8,12,.42);
    --font:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#000;color:var(--ink);font-family:var(--font)}
  #stage{position:fixed;inset:0;cursor:grab;touch-action:none}
  #stage.grabbing{cursor:grabbing}
  canvas{display:block}

  /* atmospheric edge vignette + film grain — installation feel */
  #vignette{position:fixed;inset:0;pointer-events:none;
    box-shadow:inset 0 0 220px 40px rgba(0,0,0,.55);
    background:radial-gradient(120% 120% at 50% 50%,transparent 55%,rgba(0,0,0,.35) 100%);
    mix-blend-mode:multiply;z-index:5}
  #grain{position:fixed;inset:-50%;pointer-events:none;opacity:.05;z-index:6;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    animation:grain 1.1s steps(3) infinite}
  @keyframes grain{0%{transform:translate(0,0)}33%{transform:translate(-4%,3%)}66%{transform:translate(3%,-2%)}100%{transform:translate(0,0)}}

  /* caption */
  #caption{position:fixed;left:clamp(18px,4vw,46px);bottom:clamp(18px,4vw,40px);z-index:10;
    transition:opacity .9s ease;pointer-events:none;user-select:none}
  #caption .t{font-weight:500;letter-spacing:.42em;font-size:clamp(15px,2.4vw,22px);text-transform:uppercase}
  #caption .s{margin-top:.55em;font-weight:300;letter-spacing:.3em;font-size:clamp(9px,1.3vw,11px);color:var(--dim);text-transform:uppercase}
  #caption .s b{color:var(--accent);font-weight:400}
  .idle #caption{opacity:.18}

  /* controls */
  #ui{position:fixed;right:clamp(16px,4vw,38px);bottom:clamp(16px,4vw,38px);z-index:10;
    display:flex;gap:9px;transition:opacity .9s ease}
  .idle #ui{opacity:.25}
  .btn{width:46px;height:46px;display:grid;place-items:center;cursor:pointer;
    background:var(--glass);border:1px solid var(--line);color:var(--ink);
    backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);border-radius:2px;
    transition:border-color .25s,color .25s,background .25s}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.on{border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .btn svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

  /* loader */
  #load{position:fixed;inset:0;z-index:20;background:#08060a;display:grid;place-items:center;
    transition:opacity .8s ease}
  #load.gone{opacity:0;pointer-events:none}
  #load .lbl{font-weight:300;letter-spacing:.45em;font-size:11px;color:var(--dim);text-transform:uppercase}
  #load .bar{margin-top:16px;width:170px;height:1px;background:var(--line);overflow:hidden}
  #load .bar i{display:block;height:100%;width:38%;background:var(--accent);
    animation:slide 1.1s cubic-bezier(.5,0,.5,1) infinite}
  @keyframes slide{0%{transform:translateX(-110%)}100%{transform:translateX(380%)}}

  /* one-time hint */
  #hint{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9;
    font-weight:300;letter-spacing:.32em;font-size:11px;color:var(--dim);text-transform:uppercase;
    text-align:center;pointer-events:none;transition:opacity 1s ease;text-shadow:0 1px 12px #000}
  #hint.gone{opacity:0}
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="vignette"></div>
  <div id="grain"></div>

  <div id="caption">
    <div class="t">Neoteric Roots</div>
    <div class="s">360° Environment · <b>Hanzzzel</b></div>
  </div>

  <div id="hint">ziehen zum umsehen · scrollen zum zoomen</div>

  <div id="ui">
    <div class="btn on" id="b-rot" title="Auto-Drehung">
      <svg viewBox="0 0 24 24"><path d="M20 12a8 8 0 1 1-2.3-5.6"/><path d="M20 4v3h-3"/></svg></div>
    <div class="btn" id="b-gyro" title="Bewegungssteuerung (Handy)">
      <svg viewBox="0 0 24 24"><rect x="7" y="3" width="10" height="18" rx="2"/><path d="M12 7v0"/></svg></div>
    <div class="btn" id="b-full" title="Vollbild">
      <svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></div>
  </div>

const stage = document.getElementById('stage');
let scene, camera, renderer, mesh;
let lon = 0, lat = 2, fov = 72;          // view state (degrees)
let tLon = 0, tLat = 2, tFov = 72;        // smoothed targets
let dragging = false, px = 0, py = 0, moved = false;
let autorot = true, gyro = false;
let pinchD = 0;
let idleT = null;

init();

function init(){
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(fov, innerWidth/innerHeight, 0.1, 1100);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.outputEncoding = THREE.sRGBEncoding;
  stage.appendChild(renderer.domElement);

  const geo = new THREE.SphereGeometry(500, 64, 44);
  geo.scale(-1, 1, 1);                       // view from inside, non-mirrored

  new THREE.TextureLoader().load(PANO, tex=>{
    tex.encoding = THREE.sRGBEncoding;
    tex.minFilter = THREE.LinearMipmapLinearFilter;
    tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
    mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({map:tex}));
    scene.add(mesh);
    const l = document.getElementById('load'); l.classList.add('gone');
    setTimeout(()=>l.remove(), 850);
    bumpIdle();
  });

  addEventListener('resize', onResize);

  // pointer look-around
  stage.addEventListener('pointerdown', e=>{
    dragging = true; moved = false; px = e.clientX; py = e.clientY;
    stage.classList.add('grabbing'); autorot && setRot(false); wake();
  });
  stage.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const dx = e.clientX - px, dy = e.clientY - py;
    if(Math.abs(dx)+Math.abs(dy) > 3) moved = true;
    px = e.clientX; py = e.clientY;
    const k = fov / 680;                       // zoom-aware sensitivity
    tLon -= dx * k * 1.5;
    tLat = clamp(tLat + dy * k * 1.5, -78, 78);
    hideHint();
  });
  addEventListener('pointerup', ()=>{ dragging=false; stage.classList.remove('grabbing'); });

  // wheel zoom
  stage.addEventListener('wheel', e=>{
    e.preventDefault();
    tFov = clamp(tFov + e.deltaY * 0.05, 28, 88); wake();
  }, {passive:false});

  // pinch zoom
  stage.addEventListener('touchmove', e=>{
    if(e.touches.length===2){
      const d = dist(e.touches[0], e.touches[1]);
      if(pinchD) tFov = clamp(tFov + (pinchD - d) * 0.12, 28, 88);
      pinchD = d; wake();
    }
  }, {passive:true});
  stage.addEventListener('touchend', ()=> pinchD = 0);

  // buttons
  document.getElementById('b-rot').onclick = ()=> setRot(!autorot);
  document.getElementById('b-full').onclick = toggleFull;
  document.getElementById('b-gyro').onclick = toggleGyro;

  animate();
}

function setRot(v){ autorot = v; document.getElementById('b-rot').classList.toggle('on', v); }

function toggleFull(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}

function toggleGyro(){
  const btn = document.getElementById('b-gyro');
  if(gyro){ gyro=false; btn.classList.remove('on'); removeEventListener('deviceorientation', onGyro); return; }
  const start = ()=>{ gyro=true; btn.classList.add('on'); setRot(false); addEventListener('deviceorientation', onGyro); };
  if(typeof DeviceOrientationEvent!=='undefined' && DeviceOrientationEvent.requestPermission){
    DeviceOrientationEvent.requestPermission().then(s=> s==='granted' && start()).catch(()=>{});
  } else start();
}
function onGyro(e){
  if(e.alpha==null) return;
  const o = (screen.orientation||{}).angle || 0;
  tLon = -(e.alpha + (e.gamma>0?0:0)) - o;
  tLat = clamp(e.beta - 90, -78, 78);
}

function animate(){
  requestAnimationFrame(animate);
  if(autorot && !dragging && !gyro) tLon += 0.035;
  lon += (tLon - lon) * 0.10;
  lat += (tLat - lat) * 0.10;
  fov += (tFov - fov) * 0.10;
  camera.fov = fov; camera.updateProjectionMatrix();

  const phi = THREE.MathUtils.degToRad(90 - lat);
  const theta = THREE.MathUtils.degToRad(lon);
  camera.lookAt(
    500*Math.sin(phi)*Math.cos(theta),
    500*Math.cos(phi),
    500*Math.sin(phi)*Math.sin(theta)
  );
  renderer.render(scene, camera);
}

function onResize(){
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const dist=(a,b)=>Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
function hideHint(){ const h=document.getElementById('hint'); h && h.classList.add('gone'); }
function wake(){ document.body.classList.remove('idle'); bumpIdle(); }
function bumpIdle(){ clearTimeout(idleT); idleT=setTimeout(()=>document.body.classList.add('idle'), 3500); }
setTimeout(hideHint, 5000);
</script>
